<section class="login-page">
  <header class="hero">
    <h1>Welcome Back</h1>
    <p>Secure access for patients, doctors, and administrators.</p>
  </header>

  <div class="layout">
    <form class="auth-card" aria-label="Sign in form">
      <h2>Sign in</h2>

      <label for="email">Work Email</label>
      <input id="email" type="email" placeholder="name@hospital.com" />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter password" />

      <label for="role">Role</label>
      <select id="role">
        <option>Patient</option>
        <option>Doctor</option>
        <option>Admin</option>
      </select>

      <button type="button">Continue</button>
    </form>

    <aside class="capabilities" aria-label="Platform capabilities">
      <h2>Platform Highlights</h2>
      <ul>
        <li>Appointment scheduling and status tracking</li>
        <li>Prescription management and patient history</li>
        <li>Report center, billing, and role-based access control</li>
      </ul>
    </aside>
  </div>
</section>
