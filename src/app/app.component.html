<div class="app-shell">
  <header class="top-bar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">+</span>
      <div>
        <p class="brand-title">HealthCare Full Project</p>
        <p class="brand-subtitle">Clinical Operations Platform</p>
      </div>
    </div>

    <div class="session" *ngIf="currentUser$ | async as currentUser; else loggedOutState">
      <p class="session-name">{{ currentUser.fullName }}</p>
      <p class="session-role">{{ currentUser.role | titlecase }}</p>
      <button type="button" (click)="logout()">Logout</button>
    </div>

    <ng-template #loggedOutState>
      <p class="session-empty">Not signed in</p>
    </ng-template>
  </header>

  <aside class="sidebar" aria-label="Main navigation">
    <nav>
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.link"
        routerLinkActive="is-active"
      >
        {{ item.label }}
      </a>
    </nav>
  </aside>

  <main class="content" aria-live="polite">
    <router-outlet></router-outlet>
  </main>
</div>
